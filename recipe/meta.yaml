{% set name = "ltbams" %}
{% set version = "1.2.1" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ltbams-{{ version }}.tar.gz
  sha256: 5dabb60d90c81f3f67c756391aa62a1507d05d819001fdb1c4c9699e9e80b0d9

build:
  entry_points:
    - ams = ams.cli:main
  script: {{ PYTHON }} -m pip install . --no-build-isolation --no-deps -vv
  number: 0
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=64
    - setuptools-scm >=8
  run:
    - python >={{ python_min }}
    - kvxopt >=1.3.2.1
    - numpy
    - scipy
    - sympy >=1.6,!=1.10.0
    - pandas
    - matplotlib-base
    - psutil
    - openpyxl
    - andes >=2.0.0
    - pybind11
    - cvxpy
    - clarabel

test:
  imports:
    - ams
  commands:
    # - pip check  # Temporarily disabled: andes-feedstock ships METADATA
    # with Version 0.0.0 (setuptools-scm fallback during noarch build),
    # which makes pip check reject our `andes >=2.0.0` run pin. Restore
    # once andes-feedstock is rebuilt with SETUPTOOLS_SCM_PRETEND_VERSION.
    - ams --help
    - ams misc --version
  requires:
    - python {{ python_min }}
    - pip
    - pytest
    - cffi

about:
  home: https://github.com/CURENT/ams
  summary: Python software for scheduling modeling and co-simulation with dynamics.
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  doc_url: https://ltb.readthedocs.io/projects/ams/
  description: |
    AMS is a Python software designed for power system scheduling modeling and co-simulation with dynamics.
    It serves as the market simulator for the CURENT Largescale Testbed, enabling stability-constrained
    production cost and market operation modeling.

extra:
  recipe-maintainers:
    - jinningwang
